            font-size: 0.8rem;

            padding: 20px;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
        }
        .btn {

            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

        }
        .btn-secondary {
            background: #e2e8f0;
            color: #1e293b;
        }

            border-radius: 20px;
            padding: 18px;
            margin-bottom: 20px;
        }
        .q-num {

            color: white;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            display: inline-block;
        }
        .question-text {
            font-weight: 600;
            margin: 12px 0;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 10px;
            cursor: pointer;
        }
        .result-card {
            background: #f1f5f9;
            border-radius: 20px;
            padding: 20px;
            margin: 0 25px 25px 25px;
            border-left: 4px solid #667eea;

        }

            font-size: 0.85rem;
            color: #475569;

                { "id": 9306, "text": "Укажите предложение, части которого связаны с помощью подчинительного союза.",

function updateSectionSelect() 
{
    const classValue = document.getElementById('classSelect').value;
    const sectionSelect = document.getElementById('sectionSelect');
    const config = classConfig[classValue];
    
    if (!config) {
        sectionSelect.innerHTML = '';
        return;
    }
    
    sectionSelect.innerHTML = config.sections.map(s => `<option value="${s}">${s}</option>`).join('');
    updateSubsectionSelect();
}

function updateSubsectionSelect() 
{
    const section = document.getElementById('sectionSelect').value;
    const classValue = document.getElementById('classSelect').value;
    const subsectionGroup = document.getElementById('subsectionGroup');
    const subsectionSelect = document.getElementById('subsectionSelect');
    const nestedGroup = document.getElementById('nestedSubsectionGroup');
    const nestedSelect = document.getElementById('nestedSubsectionSelect');
    const config = classConfig[classValue];
    
    if (!config) {
        subsectionGroup.style.display = 'none';
        nestedGroup.style.display = 'none';
        subsectionSelect.innerHTML = '';
        nestedSelect.innerHTML = '';
        newTest();
        return;
    }
    
    const subsections = config.subsections[section] || [];
    
    // Показываем подразделы
    if (subsections.length > 0) {
        subsectionGroup.style.display = 'flex';
        subsectionSelect.innerHTML = '<option value="">-- Выберите подраздел --</option>' + 
            subsections.map(sub => `<option value="${sub}">${sub}</option>`).join('');
    } else {
        subsectionGroup.style.display = 'none';
        subsectionSelect.innerHTML = '';
    }

    // Скрываем вложенный селект по умолчанию
    nestedGroup.style.display = 'none';
    nestedSelect.innerHTML = '';
    
    // ДЛЯ 7 КЛАССА: используем subsectionSelect.value напрямую
    if (classValue === "7" && section && section.startsWith("Морфология.") && subsectionSelect.value) {        const classData = questionsDB[classValue];
        const subData = classData?.[section]?.[subsectionSelect.value];
        if (subData && typeof subData === 'object' && !Array.isArray(subData)) {
            const keys = Object.keys(subData);
            if (keys.length > 0) {
                nestedGroup.style.display = 'flex';
                nestedSelect.innerHTML = '<option value="">-- Выберите часть речи --</option>' + 
                    keys.map(key => `<option value="${key}">${key}</option>`).join('');
            }
        }
    }
    
    newTest();
}

function getCurrentQuestionsArray() 
{
    const section = document.getElementById('sectionSelect').value;
    const subsection = document.getElementById('subsectionSelect').value;
    const nested = document.getElementById('nestedSubsectionSelect').value;
    const classValue = document.getElementById('classSelect').value;
    const classData = questionsDB[classValue];
    
    if (!classData) return [];

    // Для 7 класса
    if (classValue === "7" && section && section.startsWith("Морфология.") && subsection && nested) {
        const subData = classData[section]?.[subsection];
        if (subData && typeof subData === 'object' && !Array.isArray(subData)) {
            return subData[nested] || [];
        }
        return [];
    }

    // Для 6 класса с подразделами
    const config = classConfig[classValue];
    if (!config) return [];
    
    const hasSubsections = config.subsections[section] && config.subsections[section].length > 0;
    
    if (hasSubsections && subsection) {
        return classData[section]?.[subsection] || [];
    }
    
    // Для 8 класса — данные лежат прямо в classData[section]
    return classData[section] || [];
}

function shuffleArray(arr) 
{
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function getRandomQuestions() 
{
    return [...getCurrentQuestionsArray()];
}

function renderQuestions() 
{
    const hasQuestions = currentQuestions && currentQuestions.length > 0;
    
    if (!hasQuestions) {
        document.getElementById('questionsContainer').innerHTML = '<div class="empty">❌ Нет вопросов для выбранного раздела</div>';
        return;
    }
    
    let html = '';
    currentQuestions.forEach((q, idx) => {
        let optionsHtml = '';
        q.options.forEach((opt, optIdx) => {
            const checked = (userAnswers[idx] === optIdx) ? 'checked' : '';
            optionsHtml += `
                <div class="option">
                    <input type="radio" name="q${idx}" value="${optIdx}" id="q${idx}_${optIdx}" ${checked}>
                    <label for="q${idx}_${optIdx}">${optIdx+1}. ${opt}</label>
                </div>
            `;
        });
        html += `
            <div class="question-card" id="question-${idx}">
                <span class="q-num">Вопрос ${idx+1}</span>
                <div class="question-text">${q.text}</div>
                <div class="options">${optionsHtml}</div>
                <div class="question-feedback" id="feedback-${idx}" style="margin-top: 10px; font-size: 0.9rem;"></div>
            </div>
        `;
    });
    document.getElementById('questionsContainer').innerHTML = html;
    
    // Добавляем обработчики на все радиокнопки после рендеринга
    document.querySelectorAll('.option input[type="radio"]').forEach((radio) => {
        radio.addEventListener('change', function() {
            const questionIndex = parseInt(this.name.replace('q', ''));
            userAnswers[questionIndex] = parseInt(this.value);
            console.log(`Ответ на вопрос ${questionIndex+1}: ${this.value}`); // для отладки
        });
    });
}

function checkTest() 
{

    document.querySelectorAll('.option input[type="radio"]:checked').forEach((radio) => {

    let unanswered = [];
    for (let i = 0; i < currentQuestions.length; i++) {

            unanswered.push(i + 1);
        }
    }
    
    if (unanswered.length > 0) {
        let message = '⚠️ Вы не ответили на вопросы: ';
        if (unanswered.length === 1) message = '⚠️ Вы не ответили на вопрос №' + unanswered[0];
        else if (unanswered.length <= 5) message = '⚠️ Вы не ответили на вопросы № ' + unanswered.join(', ');
        else message = '⚠️ Вы не ответили на ' + unanswered.length + ' вопросов (№ ' + unanswered.slice(0, 5).join(', ') + ' и др.)';
        alert(message);
        return;
    }
    
    let correct = 0;

        const correctAns = currentQuestions[i].correct;
        const card = document.getElementById(`question-${i}`);

        const userText = currentQuestions[i].options[user];

    const total = currentQuestions.length;

function saveResult(classValue, section, correct, total, percent, grade, gradeText, details, timeSpent) {
    const userName = localStorage.getItem('testUser') || 'Неизвестный';
    
    // Сохраняем в localStorage
    let history = JSON.parse(localStorage.getItem('testHistory') || '[]');
    history.push({
        date: new Date().toLocaleString(),
        user: userName,
        class: classValue,
        section: section,
        correct: correct,
        total: total,
        percent: percent,
        grade: grade,
        gradeText: gradeText,
        details: details || 'Нет деталей',
        time: timeSpent || '00:00'
    });
    localStorage.setItem('testHistory', JSON.stringify(history));
    
    // Отправляем в Google Таблицу
    const webAppUrl = 'https://script.google.com/macros/s/AKfycbwNOm7Gz2JFv-te0UHOt0E_4Bli584UO_wEiBsXPdTShgUDM-teMrCfuFpH-l4DCc1H/exec';
    
    const data = {
        date: new Date().toLocaleString(),
        user: userName,
        class: classValue,
        section: section,
        result: correct + '/' + total + ' (' + percent + '%)',
        grade: grade + ' (' + gradeText + ')',
        time: timeSpent || '00:00',
        details: details || 'Нет деталей'
    };
    
    console.log('📤 Отправляем данные:', data);

    fetch(webAppUrl, {
        method: 'POST',
        mode: 'no-cors',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify(data)
    }).then((response) => {
        console.log('✅ Ответ от сервера:', response);
        alert('✅ Данные отправлены!');    }).catch(error => {
        alert('❌ Ошибка: ' + error);
        console.log('Ошибка отправки в таблицу:', error);
    });
}

function showHistory() {
    let history = JSON.parse(localStorage.getItem('testHistory') || '[]');
    const currentUser = localStorage.getItem('testUser') || 'Неизвестный';
    
    if (history.length === 0) {
        alert('📭 История пуста. Пройдите тест!');
        return;
    }
    
    // Все возможные классы
    const allClasses = ['5', '6', '7', '8', '9'];
    
    // Группируем по классам
    const grouped = {};
    allClasses.forEach(cls => {
        grouped[cls + ' класс'] = [];
    });
    
    history.forEach(item => {
        // Приводим класс к единому формату
        let classKey = item.class || 'Неизвестный класс';
        // Если в записи только цифра (например "6"), добавляем " класс"
        if (classKey.match(/^\d+$/)) {
            classKey = classKey + ' класс';
        }
        if (!grouped[classKey]) grouped[classKey] = [];
        grouped[classKey].push(item);
    });
    
    let html = '<div style="font-family:Segoe UI,sans-serif;position:relative;">';
    html += '<h2 style="text-align:center;color:#1e293b;margin-bottom:5px;">📊 ВСЕ РЕЗУЛЬТАТЫ</h2>';
    html += '<p style="text-align:center;color:#667eea;font-weight:600;margin-bottom:15px;">👤 Текущий: ' + currentUser + ' | Всего: ' + history.length + ' тестов</p>';
    html += '<hr style="border:1px solid #e2e8f0;margin-bottom:20px;">';
    
    html += '<div id="historyScrollContainer" style="max-height:55vh;overflow-y:auto;padding-right:5px;">';
    
    const sortedClasses = Object.keys(grouped).sort((a, b) => {
        const numA = parseInt(a);
        const numB = parseInt(b);
        if (!isNaN(numA) && !isNaN(numB)) return numA - numB;
        return a.localeCompare(b);
    });
    
    sortedClasses.forEach((classKey, classIndex) => {
        const tests = grouped[classKey];
        const classId = 'class_' + classIndex;
        const hasTests = tests.length > 0;
        
        html += '<div style="background:' + (hasTests ? '#e8e0f5' : '#f1f5f9') + ';border-radius:15px;padding:15px;margin-bottom:15px;border-left:4px solid ' + (hasTests ? '#7c5cfc' : '#94a3b8') + ';">';
        
        html += '<div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;" onclick="toggleClass(\'' + classId + '\')">';

        html += '<div id="' + classId + '" style="display:none;margin-top:10px;">';
        
        if (hasTests) {
            tests.forEach((item, index) => {

                html += '</div>';
                html += '<div style="display:flex;align-items:center;gap:12px;">';
                html += '<span style="font-weight:600;color:' + resultColor + ';">' + item.grade + ' (' + item.gradeText + ')</span>';
                html += '<span style="font-size:1.2rem;color:#667eea;" id="' + testId + '_icon">▼</span>';
                html += '</div>';
                html += '</div>';
                
                html += '<div style="display:flex;flex-wrap:wrap;gap:15px;margin-top:5px;font-size:0.9rem;color:#475569;">';
                html += '<span>📖 ' + item.section + '</span>';
                html += '<span>✅ ' + item.correct + '/' + item.total + ' (' + item.percent + '%)</span>';
                html += '<span>⏱️ ' + (item.time || '00:00') + '</span>';
                html += '</div>';
                
                html += '<div id="' + testId + '" style="display:none;margin-top:12px;">';
                
                if (item.details && item.details !== 'Нет деталей') {
                    const lines = item.details.split('\n').filter(line => line.trim());
                    let questionNum = 0;
                    let questionText = '';
                    let userAnswer = '';
                    let correctAnswer = '';
                    let isCorrectQ = false;
                    
                    lines.forEach(line => {
                        if (line.includes('✅ Вопрос') || line.includes('❌ Вопрос')) {
                            if (questionText) {
                                const borderColor = isCorrectQ ? '#10b981' : '#ef4444';
                                html += '<div style="background:white;border-radius:10px;padding:10px;margin-bottom:6px;border:1px solid ' + borderColor + ';border-left:4px solid ' + borderColor + ';">';
                                html += '<div style="font-weight:600;color:#1e293b;font-size:0.85rem;">Вопрос ' + questionNum + ':</div>';
                                html += '<div style="color:#1e293b;font-size:0.8rem;padding:3px 0;">' + questionText + '</div>';
                                if (userAnswer) {
                                    html += '<div style="color:' + (isCorrectQ ? '#10b981' : '#ef4444') + ';font-size:0.8rem;padding:1px 0;">' + (isCorrectQ ? '✅ Ответ: ' : '❌ Ваш ответ: ') + userAnswer + '</div>';
                                }
                                if (correctAnswer && !isCorrectQ) {
                                    html += '<div style="color:#10b981;font-size:0.8rem;padding:1px 0;">✅ Правильный ответ: ' + correctAnswer + '</div>';
                                }
                                html += '</div>';
                                questionText = '';
                                userAnswer = '';
                                correctAnswer = '';
                            }
                            
                            questionNum++;
                            isCorrectQ = line.includes('✅');
                            questionText = line.replace(/[✅❌] Вопрос \d+: /, '').trim();
                        } else if (line.includes('Ответ:')) {
                            userAnswer = line.replace('Ответ:', '').trim();
                        } else if (line.includes('Ваш ответ:') && line.includes('Правильный ответ:')) {
                            const parts = line.split('Правильный ответ:');
                            userAnswer = parts[0].replace('Ваш ответ:', '').trim();
                            correctAnswer = parts[1].trim();
                        } else if (line.includes('Ваш ответ:')) {
                            userAnswer = line.replace('Ваш ответ:', '').trim();
                        } else if (line.includes('Правильный ответ:')) {
                            correctAnswer = line.replace('Правильный ответ:', '').trim();
                        }
                    });
                    
                    if (questionText) {
                        const borderColor = isCorrectQ ? '#10b981' : '#ef4444';
                        html += '<div style="background:white;border-radius:10px;padding:10px;margin-bottom:6px;border:1px solid ' + borderColor + ';border-left:4px solid ' + borderColor + ';">';
                        html += '<div style="font-weight:600;color:#1e293b;font-size:0.85rem;">Вопрос ' + questionNum + ':</div>';
                        html += '<div style="color:#1e293b;font-size:0.8rem;padding:3px 0;">' + questionText + '</div>';
                        if (userAnswer) {
                            html += '<div style="color:' + (isCorrectQ ? '#10b981' : '#ef4444') + ';font-size:0.8rem;padding:1px 0;">' + (isCorrectQ ? '✅ Ответ: ' : '❌ Ваш ответ: ') + userAnswer + '</div>';
                        }
                        if (correctAnswer && !isCorrectQ) {
                            html += '<div style="color:#10b981;font-size:0.8rem;padding:1px 0;">✅ Правильный ответ: ' + correctAnswer + '</div>';
                        }
                        html += '</div>';
                    }
                }
                
                html += '<div style="text-align:center;margin-top:8px;padding-top:8px;border-top:1px dashed #e2e8f0;">';
                html += '<span onclick="toggleTest(\'' + testId + '\')" style="cursor:pointer;color:#667eea;font-size:0.8rem;font-weight:600;">▲ СВЕРНУТЬ</span>';
                html += '</div>';
                
                html += '</div>';
                html += '</div>';
            });
        } else {
            html += '<div style="color:#94a3b8;font-size:0.9rem;padding:10px 0;text-align:center;">📭 Нет тестов</div>';
        }
        
        html += '</div>';
        html += '</div>';
    });
    
    html += '</div>';
    
    html += '<div style="display:flex;justify-content:center;gap:20px;margin-top:15px;padding-top:10px;border-top:1px solid #e2e8f0;">';
    html += '<button onclick="scrollHistory(\'up\')" style="padding:8px 25px;border:none;border-radius:40px;font-size:1rem;font-weight:600;cursor:pointer;background:#667eea;color:white;">▲ ВВЕРХ</button>';
    html += '<button onclick="scrollHistory(\'down\')" style="padding:8px 25px;border:none;border-radius:40px;font-size:1rem;font-weight:600;cursor:pointer;background:#667eea;color:white;">▼ ВНИЗ</button>';
    html += '</div>';
    
    html += '</div>';
    
    const modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:9999;display:flex;justify-content:center;align-items:center;';
    
    const box = document.createElement('div');
    box.style.cssText = 'background:white;padding:30px;border-radius:20px;max-width:700px;width:95%;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.3);';
    box.innerHTML = html;
    
    const btnContainer = document.createElement('div');
    btnContainer.style.cssText = 'display:flex;gap:10px;justify-content:center;margin-top:15px;flex-wrap:wrap;';
    
    const btnClose = document.createElement('button');
    btnClose.textContent = '✖ ЗАКРЫТЬ';
    btnClose.style.cssText = 'padding:10px 30px;border:none;border-radius:40px;font-size:0.95rem;font-weight:600;cursor:pointer;background:#e2e8f0;color:#1e293b;';
    btnClose.onclick = function() { document.body.removeChild(modal); };
    
    const btnClear = document.createElement('button');
    btnClear.textContent = '🗑️ ОЧИСТИТЬ ВСЁ';
    btnClear.style.cssText = 'padding:10px 30px;border:none;border-radius:40px;font-size:0.95rem;font-weight:600;cursor:pointer;background:#ef4444;color:white;';
    btnClear.onclick = function() {
        if (confirm('🗑️ Вы уверены, что хотите очистить ВСЕ результаты (' + history.length + ' записей) ВСЕХ пользователей?')) {
            localStorage.removeItem('testHistory');
            alert('✅ Все результаты очищены!');
            document.body.removeChild(modal);
        }
    };
    
    btnContainer.appendChild(btnClose);
    btnContainer.appendChild(btnClear);
    
    box.appendChild(btnContainer);
    modal.appendChild(box);
    document.body.appendChild(modal);
}

function showHistoryWithPassword() 
{
    // Запрашиваем пароль
    const password = prompt('🔒 Введите пароль для просмотра результатов:');
    
    // Если пользователь нажал "Отмена" или ничего не ввел
    if (password === null) return;
    
    // Проверяем пароль
    if (password === '3369') {
        showHistory();
    } else {
        alert('❌ Неверный пароль!');
    }
}

function scrollHistory(direction) 
{
    const container = document.getElementById('historyScrollContainer');
    if (!container) {
        alert('Контейнер не найден!');
        return;
    }
    
    if (direction === 'up') {
        container.scrollTo({ top: 0, behavior: 'smooth' });
    } else if (direction === 'down') {
        container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
    }
}

function toggleTest(id) 
{
    const content = document.getElementById(id);
    const icon = document.getElementById(id + '_icon');
    if (content.style.display === 'none') {
        content.style.display = 'block';
        icon.textContent = '▲';
    } else {
        content.style.display = 'none';
        icon.textContent = '▼';
    }
}

function toggleClass(id) 
{
    const content = document.getElementById(id);
    const icon = document.getElementById(id + '_icon');
    if (content.style.display === 'none') {
        content.style.display = 'block';
        icon.textContent = '▼';
    } else {
        content.style.display = 'none';
        icon.textContent = '▶';
    }
}

function newTest() 
{
    // Сбрасываем таймер
    stopTimer();
    document.getElementById('timerDisplay').textContent = '⏱️ 00:00';
    startTimer();
    
    const section = document.getElementById('sectionSelect').value;
    const subsection = document.getElementById('subsectionSelect').value;
    const nested = document.getElementById('nestedSubsectionSelect').value;
    const classValue = document.getElementById('classSelect').value;
    const classData = questionsDB[classValue];
    let data = [];
    
    if (classValue === "7" && section && section.startsWith("Морфология.") && subsection && nested) {        
        const subData = classData?.[section]?.[subsection];
        if (subData && typeof subData === 'object' && !Array.isArray(subData)) {
            data = subData[nested] || [];
        }
    } else {
        const allData = getCurrentQuestionsArray();
        if (allData.length > 10) {
            const shuffled = shuffleArray([...allData]);
            data = shuffled.slice(0, 10);
        } else {
            data = allData;
        }
    }
    
    if (data && Array.isArray(data) && data.length > 0) {
        currentQuestions = data;
        userAnswers = new Array(currentQuestions.length).fill(null);
    } else {
        currentQuestions = [];
        userAnswers = [];
    }
    
    renderQuestions();
    document.getElementById('resultContainer').innerHTML = '';
    updateStats();
    
    // Прокручиваем наверх после создания теста
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
function updateStats() 
{
    const stats = document.getElementById('stats');
    const classValue = document.getElementById('classSelect').value;
    const section = document.getElementById('sectionSelect').value;
    const subsection = document.getElementById('subsectionSelect').value;
    const nested = document.getElementById('nestedSubsectionSelect').value;
    
    let text = `📊 ${classValue} класс → ${section}`;
    if (subsection) text += ` → ${subsection}`;
    if (nested) text += ` → ${nested}`;
    text += ` (${currentQuestions.length} вопросов)`;
    stats.textContent = text;
}

function startTimer() 
{
    isTestFinished = false;
    startTime = Date.now();
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(updateTimer, 1000);
}

function updateTimer() 
{
    if (isTestFinished) return;
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const minutes = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const seconds = String(elapsed % 60).padStart(2, '0');
    document.getElementById('timerDisplay').textContent = '⏱️ ' + minutes + ':' + seconds;
}

function stopTimer() 
{
    isTestFinished = true;
    if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
    }
}

function getTimeSpent() {
    if (!startTime) return '00:00';
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const minutes = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const seconds = String(elapsed % 60).padStart(2, '0');
    return minutes + ':' + seconds;
}




function saveResult(classValue, section, correct, total, percent, grade, gradeText, details, timeSpent) {
    const userName = localStorage.getItem('testUser') || 'Неизвестный';
    let history = JSON.parse(localStorage.getItem('testHistory') || '[]');
    history.push({
        date: new Date().toLocaleString(),
        user: userName,
        class: classValue,
        section: section,
        correct: correct,
        total: total,
        percent: percent,
        grade: grade,
        gradeText: gradeText,
        details: details || 'Нет деталей',
        time: timeSpent || '00:00'
    });
    localStorage.setItem('testHistory', JSON.stringify(history));
}
